    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
        .rainbow-text-header {
            background-image: linear-gradient(to right, #667eea, #764ba2, #6b21a8, #0ea5e9, #14b8a6, #f97316);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: rainbow 5s linear infinite;
            background-size: 200% 100%;
            transition: transform 0.3s ease;
            display: inline-block;
        }
        .rainbow-text-header:hover {
            transform: scale(1.05);
        }
        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }
        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid #fff;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .carousel-container {
            position: relative;
            width: 100%;
            height: 500px;
            overflow: hidden;
        }
        .carousel-item {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }
        .carousel-item.active {
            opacity: 1;
        }
        .carousel-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }
        .carousel-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 5;
        }
        .carousel-content {
            position: absolute;
            bottom: 0;
            left: 0;
            padding: 2rem;
            max-width: 50%;
            z-index: 10;
        }
        @media (max-width: 768px) {
            .carousel-content {
                max-width: 100%;
                padding: 1rem;
            }
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-200">

    <div id="app"></div>

    <script type="module">
        const BASE_URL = 'https://tmdb-api-proxy.argoyuwono119.workers.dev';
        const IMAGE_BASE_URL = 'https://image.tmdb.org/t/p/original';
        const app = document.getElementById('app');

        // --- STATE MANAGEMENT ---
        let state = {
            clickCount: 0
        };

        // --- LOGIKA IKLAN ---
        function showAd() {
            console.log('Menampilkan iklan Adsterra...');
            if (window.ADSTERRA_DIRECT_LINKS && window.ADSTERRA_DIRECT_LINKS.length > 0) {
                const adLinks = window.ADSTERRA_DIRECT_LINKS;
                const randomIndex = Math.floor(Math.random() * adLinks.length);
                const adUrl = adLinks[randomIndex];
                window.open(adUrl, '_blank');
            }
        }

        document.addEventListener('click', () => {
            state.clickCount++;
            if (state.clickCount >= 2 && (state.clickCount - 2) % 5 === 0) {
                showAd();
            }
        });

        // --- PEMBANTU API ---
        async function fetchData(url) {
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`Error: ${response.status}`);
                return await response.json();
            } catch (err) {
                console.error("Fetch error:", err);
                return { error: err.message };
            }
        }

        // --- UTILITAS ---
        function createSlug(title) {
            if (!title) return '';
            return title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
        }
        
        function updateMeta(title, description) {
            document.title = title;
            let metaDesc = document.querySelector('meta[name="description"]');
            if (!metaDesc) {
                metaDesc = document.createElement('meta');
                metaDesc.name = "description";
                document.head.appendChild(metaDesc);
            }
            metaDesc.content = description;
        }

        // Fungsi ini menggunakan history.pushState untuk mengelola URL tanpa memuat ulang halaman.
        function navigateTo(path) {
            history.pushState(null, '', path);
            router();
        }

        // --- KOMPONEN (sebagai fungsi yang mengembalikan string HTML) ---

        function Footer() {

        function MovieCard(media, mediaType) {
            const posterUrl = media.poster_path ? `${IMAGE_BASE_URL.replace('original', 'w500')}${media.poster_path}` : 'https://placehold.co/500x750?text=No+Image';
            const title = media.title || media.name;

            const slug = createSlug(title);
            
            return `

                      <p class="text-white text-lg font-bold">${title}</p>
                    </div>
                  </div>
                  <div class="p-2 text-center text-white">
                    <h3 class="text-sm font-semibold truncate">${title}</h3>
                    <p class="text-xs text-gray-400">${year}</p>
                  </div>
                </div>
            `;
        }
        
        async function MediaSection(title, url, mediaType) {
            const data = await fetchData(url);
            if (!data || !data.results) return `<p class="text-center text-red-500 text-lg">Failed to load content.</p>`;
            
            const content = data.results.filter(item => item.poster_path);

            return `

                  <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6">
                    ${content.map(item => MovieCard(item, mediaType)).join('')}
                  </div>
                </div>
            `;
        }

                        <div>⭐ Rating: <b>${media.vote_average ? media.vote_average.toFixed(1) : 'N/A'}</b>/10</div>

             if (!data || !data.results) return `<p class="text-center text-red-500 text-lg">No results found.</p>`;
             
             const content = data.results.filter(item => item.poster_path && (item.media_type === 'movie' || item.media_type === 'tv'));

             return `
                <main class="container mx-auto px-4 py-8 max-w-7xl">
                    <h1 class="text-3xl md:text-4xl font-extrabold text-white mb-6">Search Results for "${query}"</h1>
                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
                        ${content.map(item => MovieCard(item, item.media_type)).join('')}
                    </div>
                </main>
             `;
        }
        
        async function GenrePage(params) {
             const { genreId, genreName } = params;
             const decodedGenreName = decodeURIComponent(genreName);
             updateMeta(`Genre: ${decodedGenreName}`, `Temukan film dalam genre ${decodedGenreName}.`);
             
             // Fetch the first page of movies
             const data = await fetchData(`${BASE_URL}/discover/movie?with_genres=${genreId}&page=1`);
             if (!data || !data.results) return `<p class="text-center text-red-500 text-lg">No movies found for this genre.</p>`;
             
             const content = data.results.filter(item => item.poster_path);
             const totalPages = data.total_pages;

             let buttonHtml = '';
             if (totalPages > 1) {
                buttonHtml = `
                    <div class="text-center mt-8">
                        <button id="load-more-btn" data-genre-id="${genreId}" data-next-page="2" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-full transition-colors duration-300 shadow-lg inline-flex items-center justify-center">
                            Load More
                        </button>
                    </div>
                `;
             }
             

             return `
                <main class="container mx-auto px-4 py-8 max-w-7xl">
                    <h1 class="text-3xl md:text-4xl font-extrabold text-white mb-6">Genre: ${decodedGenreName}</h1>
                    <div id="movie-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
                        ${content.map(item => MovieCard(item, 'movie')).join('')}
                    </div>
                    ${buttonHtml}
                </main>
             `;
        }


        // --- ROUTER ---
        const routes = {
            '/': HomePage,
            // Mengubah rute untuk halaman daftar film/tv agar tidak berkonflik dengan rute detail baru
            '/list/movies': MoviePage,
            '/list/tv': TvPage,
            // Rute baru untuk detail yang tidak lagi memiliki "details"
            '/:mediaType/:mediaId/:mediaTitleSlug': DetailsPage,
            '/stream/:mediaType/:mediaId/:mediaTitleSlug': StreamingPage,
            '/search/:query': SearchPage,
            '/genre/:genreId/:genreName': GenrePage,
        };

        async function router() {
            const path = window.location.pathname;
            const parts = path.split('/').filter(p => p);
            
            let page = null;
            let params = {};

            // Mencocokkan rute dinamis
            for (const route in routes) {
                const routeParts = route.split('/').filter(p => p);
                if (routeParts.length === parts.length) {
                    let match = true;
                    let tempParams = {};
                    for (let i = 0; i < routeParts.length; i++) {
                        if (routeParts[i].startsWith(':')) {
                            tempParams[routeParts[i].substring(1)] = parts[i];
                        } else if (routeParts[i] !== parts[i]) {
                            match = false;
                            break;
                        }
                    }
                    if (match) {
                        page = routes[route];
                        params = tempParams;
                        break;
                    }
                }
            }
            
            // Mencocokkan rute statis jika tidak ada rute dinamis yang ditemukan
            if (!page) {
                page = routes[path] || routes['/']; // Kembali ke beranda
            }

            app.innerHTML = `<div class="loading-spinner my-20"></div>`; // Tampilkan pemuat
            const pageContent = await page(params);
            app.innerHTML = Header() + pageContent + Footer();
            addEventListeners();
        }
        
        function addEventListeners() {
            // Event listener untuk semua tautan navigasi internal
            document.querySelectorAll('a[data-nav-link]').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const path = e.target.getAttribute('href');
                    navigateTo(path);
                });
            });

            // Form pencarian
            const searchForm = document.getElementById('search-form');
            if(searchForm) {
                searchForm.addEventListener('submit', e => {
                    e.preventDefault();
                    const searchInput = document.getElementById('search-input');
                    if (searchInput.value.trim()) {
                        navigateTo(`/search/${searchInput.value.trim()}`);
                        searchInput.value = '';
                    }
                });
            }

            // Kartu film
            document.querySelectorAll('.movie-card').forEach(card => {
                card.addEventListener('click', () => {
                    const { id, type, slug } = card.dataset;
                    // Tautan diperbarui
                    navigateTo(`/${type}/${id}/${slug}`);
                });
            });
            
            // Tombol streaming
            document.querySelectorAll('.stream-btn').forEach(button => {
                button.addEventListener('click', (e) => {
                    const { source, type, id } = e.target.dataset;
                    const iframe = document.getElementById('stream-iframe');
                    const notice = document.getElementById('stream-notice');
                    
                    let streamUrl = '';
                    if (source === 'vidsrc.me') {
                        streamUrl = `https://vidsrc.me/embed/${id}`;
                    } else { // vidsrc.to
                        streamUrl = `https://vidsrc.to/embed/${type}/${id}`;
                    }
                    
                    if (iframe) iframe.src = streamUrl;
                    if (notice) notice.style.display = 'none';

                    // Perbarui gaya tombol
                    document.querySelectorAll('.stream-btn').forEach(btn => {
                        btn.classList.remove('bg-blue-600', 'text-white');
                        btn.classList.add('bg-gray-700', 'text-gray-300');
                    });
                    e.target.classList.add('bg-blue-600', 'text-white');
                    e.target.classList.remove('bg-gray-700', 'text-gray-300');
                });
            });

            // Carousel
            let currentSlide = 0;
            const slides = document.querySelectorAll('.carousel-item');
            const dots = document.querySelectorAll('.carousel-dot');
            if (slides.length > 0) {
                const showSlide = (index) => {
                    slides.forEach((slide, i) => {
                        slide.classList.toggle('active', i === index);
                    });
                     dots.forEach((dot, i) => {
                        dot.classList.toggle('bg-white', i === index);
                        dot.classList.toggle('bg-gray-500', i !== index);
                    });
                };

                setInterval(() => {
                    currentSlide = (currentSlide + 1) % slides.length;
                    showSlide(currentSlide);
                }, 5000);

                dots.forEach(dot => {
                    dot.addEventListener('click', (e) => {
                        currentSlide = parseInt(e.target.dataset.slideTo);
                        showSlide(currentSlide);
                    });
                });
            }

            // Tombol 'Load More' untuk GenrePage
            const loadMoreBtn = document.getElementById('load-more-btn');
            if (loadMoreBtn) {
                loadMoreBtn.addEventListener('click', async () => {
                    const genreId = loadMoreBtn.dataset.genreId;
                    let nextPage = parseInt(loadMoreBtn.dataset.nextPage, 10);
                    
                    loadMoreBtn.innerHTML = `<div class="loading-spinner w-6 h-6"></div>`;
                    loadMoreBtn.disabled = true;

                    const data = await fetchData(`${BASE_URL}/discover/movie?with_genres=${genreId}&page=${nextPage}`);
                    
                    if (data && data.results && data.results.length > 0) {
                        const movieGrid = document.getElementById('movie-grid');
                        const newMovies = data.results.filter(item => item.poster_path);
                        const newHtml = newMovies.map(item => MovieCard(item, 'movie')).join('');
                        movieGrid.insertAdjacentHTML('beforeend', newHtml);
                        
                        loadMoreBtn.dataset.nextPage = nextPage + 1;
                        loadMoreBtn.innerHTML = 'Load More';
                        loadMoreBtn.disabled = false;
                    } else {
                        loadMoreBtn.innerHTML = 'No More Movies';
                        loadMoreBtn.disabled = true;
                    }

                    // Pasang kembali event listener ke kartu film yang baru ditambahkan
                    document.querySelectorAll('.movie-card').forEach(card => {
                        card.addEventListener('click', () => {
                            const { id, type, slug } = card.dataset;
                            navigateTo(`/${type}/${id}/${slug}`);
                        });
                    });
                });
            }
        }

        // Ini adalah bagian penting yang menangani navigasi pushState.
        // Dengarkan klik tombol kembali/maju
        window.addEventListener('popstate', router);
        // Jalankan router saat halaman pertama kali dimuat
        window.addEventListener('DOMContentLoaded', router);

    </script>
</body>
</html>
